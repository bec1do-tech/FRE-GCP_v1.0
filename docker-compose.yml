# ─────────────────────────────────────────────────────────────────────────────
# FRE GCP v1.0 — Local Development Stack
# Mirrors the GCP services locally so you can develop without cloud access.
#
# Usage:
#   docker compose up -d          # start postgres + elasticsearch
#   adk web                       # run the ADK agent (separate terminal)
# ─────────────────────────────────────────────────────────────────────────────

version: "3.9"

services:

  # ── PostgreSQL  (mirrors Cloud SQL) ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       fre_cognitive_search
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: FRE_Bosch_3169!
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Elasticsearch 8.x  (mirrors Elastic Cloud) ───────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

volumes:
  postgres_data:
  es_data:
